{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% block title %}{{ title }}{% endblock %}

{% block content %}
<div class="page-header">
  <div>
    <h1>{{ title }}</h1>
    <div class="breadcrumb-trail">
      <a href="{% url 'requisitions:template_list' %}">Templates</a> &rsaquo; {{ title }}
    </div>
  </div>
</div>

<form method="post" novalidate>
  {% csrf_token %}
  <div class="card">
    <div class="card-body">
      {{ form|crispy }}
      <p class="text-muted small mb-0">
        <i class="ri-information-line me-1"></i>
        Save the template first, then add pre-defined lines on its detail page.
      </p>
    </div>
    <div class="card-footer d-flex justify-content-between">
      <a href="{% if template %}{% url 'requisitions:template_detail' template.pk %}{% else %}{% url 'requisitions:template_list' %}{% endif %}"
         class="btn btn-outline-secondary">Cancel</a>
      <button type="submit" class="btn btn-primary"><i class="ri-save-line me-1"></i> Save template</button>
    </div>
  </div>
</form>
{% endblock %}

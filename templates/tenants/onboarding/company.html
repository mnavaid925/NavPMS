{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% block title %}Onboarding: company{% endblock %}

{% block content %}
<div class="page-header">
  <div>
    <h1>Company details</h1>
    <div class="breadcrumb-trail">Step 2 of 3 &middot; Tell us about the organization</div>
  </div>
</div>

<div class="row justify-content-center">
  <div class="col-lg-8">
    <form method="post" novalidate>
      {% csrf_token %}
      <div class="card">
        <div class="card-body">
          {{ form|crispy }}
        </div>
        <div class="card-footer d-flex justify-content-between">
          <a href="{% url 'tenants:onboarding_start' %}" class="btn btn-outline-secondary">
            <i class="ri-arrow-left-line me-1"></i> Back
          </a>
          <button type="submit" class="btn btn-primary">
            Continue <i class="ri-arrow-right-line ms-1"></i>
          </button>
        </div>
      </div>
    </form>
  </div>
</div>
{% endblock %}

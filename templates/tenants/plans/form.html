{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% block title %}{{ title }}{% endblock %}

{% block content %}
<div class="page-header">
  <div>
    <h1>{{ title }}</h1>
    <div class="breadcrumb-trail"><a href="{% url 'tenants:plan_list' %}">Plans</a> &rsaquo; {{ title }}</div>
  </div>
</div>

<form method="post" novalidate>
  {% csrf_token %}
  <div class="card">
    <div class="card-body">{{ form|crispy }}</div>
    <div class="card-footer d-flex justify-content-between">
      <a href="{% url 'tenants:plan_list' %}" class="btn btn-outline-secondary">Cancel</a>
      <button type="submit" class="btn btn-primary"><i class="ri-save-line me-1"></i> Save plan</button>
    </div>
  </div>
</form>
{% endblock %}

{% extends 'base.html' %}
{% block title %}{% if is_edit %}Edit Currency{% else %}New Currency{% endif %}{% endblock %}

{% block content %}
<div class="page-header">
  <h1 class="page-title">{% if is_edit %}Edit {{ currency.code }}{% else %}New Currency{% endif %}</h1>
</div>
<div class="card"><div class="card-body">
  <form method="post">
    {% csrf_token %}
    {% include 'sysadmin/_form.html' %}
    <div class="d-flex gap-2">
      <button class="btn btn-primary"><i class="ri-save-line"></i> Save</button>
      <a href="{% url 'sysadmin:currency_list' %}" class="btn btn-outline-secondary">Cancel</a>
    </div>
  </form>
</div></div>
{% endblock %}

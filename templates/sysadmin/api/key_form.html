{% extends 'base.html' %}
{% block title %}New API Key{% endblock %}

{% block content %}
<div class="page-header">
  <h1 class="page-title">Issue API Key</h1>
  <p class="page-subtitle">The secret is generated server-side and shown only once on the next screen</p>
</div>
<div class="card"><div class="card-body">
  <form method="post">
    {% csrf_token %}
    {% include 'sysadmin/_form.html' %}
    <div class="d-flex gap-2">
      <button class="btn btn-primary"><i class="ri-key-2-line"></i> Issue Key</button>
      <a href="{% url 'sysadmin:apikey_list' %}" class="btn btn-outline-secondary">Cancel</a>
    </div>
  </form>
</div></div>
{% endblock %}

{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% block title %}Edit criterion — {{ event.event_number }}{% endblock %}

{% block content %}
<div class="page-header">
  <div>
    <h1>Edit criterion</h1>
    <div class="breadcrumb-trail">
      <a href="{% url 'sourcing:event_list' %}">Sourcing Events</a> &rsaquo;
      <a href="{% url 'sourcing:event_detail' event.pk %}">{{ event.event_number }}</a> &rsaquo;
      {{ criterion.name }}
    </div>
  </div>
</div>

<form method="post" novalidate>
  {% csrf_token %}
  <div class="card">
    <div class="card-body">
      {{ form|crispy }}
    </div>
    <div class="card-footer d-flex justify-content-between">
      <a href="{% url 'sourcing:event_detail' event.pk %}" class="btn btn-outline-secondary">Cancel</a>
      <button type="submit" class="btn btn-primary"><i class="ri-save-line me-1"></i> Save criterion</button>
    </div>
  </div>
</form>
{% endblock %}

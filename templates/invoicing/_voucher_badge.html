{% if status == 'draft' %}<span class="badge badge-soft-secondary">Draft</span>
{% elif status == 'approved' %}<span class="badge badge-soft-primary">Approved</span>
{% elif status == 'scheduled' %}<span class="badge badge-soft-info">Scheduled</span>
{% elif status == 'paid' %}<span class="badge badge-soft-success">Paid</span>
{% else %}<span class="badge badge-soft-dark">Cancelled</span>{% endif %}

{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% block title %}{% if is_edit %}Edit Clause{% else %}New Clause{% endif %}{% endblock %}

{% block content %}
<div class="page-header">
  <h1 class="page-title">{% if is_edit %}Edit Clause{% else %}New Clause{% endif %}</h1>
  <p class="page-subtitle">Clause library</p>
</div>

<div class="row">
  <div class="col-lg-8">
    <div class="card">
      <div class="card-body">
        <form method="post" novalidate>
          {% csrf_token %}
          {{ form|crispy }}
          <div class="d-flex gap-2 mt-3">
            <button type="submit" class="btn btn-primary"><i class="ri-save-line"></i> Save</button>
            <a href="{% url 'contracts:clause_list' %}" class="btn btn-outline-secondary">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}

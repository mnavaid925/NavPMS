{% extends 'base_auth.html' %}
{% block title %}Password updated{% endblock %}
{% block content %}
  <div class="text-center my-3">
    <div class="d-inline-flex align-items-center justify-content-center"
         style="width:64px;height:64px;border-radius:50%;background:rgba(34,197,94,.12);color:#16a34a;">
      <i class="ri-check-line" style="font-size:30px;"></i>
    </div>
  </div>
  <h1 class="auth-title">Password updated</h1>
  <p class="auth-subtitle">You can now sign in with your new password.</p>
  <a href="{% url 'accounts:login' %}" class="btn btn-primary">Sign in</a>
{% endblock %}

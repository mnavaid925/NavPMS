{% extends 'base_auth.html' %}
{% block title %}Check your email{% endblock %}
{% block content %}
  <div class="text-center my-3">
    <div class="d-inline-flex align-items-center justify-content-center"
         style="width:64px;height:64px;border-radius:50%;background:rgba(34,197,94,.12);color:#16a34a;">
      <i class="ri-mail-check-line" style="font-size:30px;"></i>
    </div>
  </div>
  <h1 class="auth-title">Check your email</h1>
  <p class="auth-subtitle">If that address is registered you'll receive a reset link shortly.</p>
  <a href="{% url 'accounts:login' %}" class="btn btn-primary">Back to sign in</a>
{% endblock %}

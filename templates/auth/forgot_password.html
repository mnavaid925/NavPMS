{% extends 'base_auth.html' %}
{% block title %}Forgot password{% endblock %}
{% block content %}
  <h1 class="auth-title">Forgot your password?</h1>
  <p class="auth-subtitle">Enter your email and we'll send you a reset link.</p>

  <form method="post" novalidate>
    {% csrf_token %}
    <div class="mb-3">
      <label class="form-label" for="id_email">Email address</label>
      <input type="email" id="id_email" name="email"
             class="form-control{% if form.email.errors %} is-invalid{% endif %}" required autofocus>
      {% for e in form.email.errors %}<div class="invalid-feedback">{{ e }}</div>{% endfor %}
    </div>
    <button type="submit" class="btn btn-primary">Send reset link</button>
  </form>

  <div class="auth-footer">
    Remembered it? <a href="{% url 'accounts:login' %}">Back to sign in</a>
  </div>
{% endblock %}

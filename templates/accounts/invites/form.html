{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% block title %}Send invitation{% endblock %}

{% block content %}
<div class="page-header">
  <div>
    <h1>Send invitation</h1>
    <div class="breadcrumb-trail"><a href="{% url 'accounts:invite_list' %}">Invitations</a> &rsaquo; New</div>
  </div>
</div>

<form method="post" novalidate>
  {% csrf_token %}
  <div class="card">
    <div class="card-body">
      <p class="text-muted small mb-3">
        We'll send a one-time link to this email. It expires in 7 days.
      </p>
      {{ form|crispy }}
    </div>
    <div class="card-footer d-flex justify-content-between">
      <a href="{% url 'accounts:invite_list' %}" class="btn btn-outline-secondary">Cancel</a>
      <button type="submit" class="btn btn-primary"><i class="ri-mail-send-line me-1"></i> Send invitation</button>
    </div>
  </div>
</form>
{% endblock %}

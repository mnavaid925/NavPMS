{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% block title %}Edit profile{% endblock %}

{% block content %}
<div class="page-header">
  <div>
    <h1>Edit profile</h1>
    <div class="breadcrumb-trail"><a href="{% url 'accounts:profile' %}">My profile</a> &rsaquo; Edit</div>
  </div>
</div>

<form method="post" enctype="multipart/form-data" novalidate>
  {% csrf_token %}
  <div class="row g-3">
    <div class="col-md-6">
      <div class="card">
        <div class="card-header">Account</div>
        <div class="card-body">{{ user_form|crispy }}</div>
      </div>
    </div>
    <div class="col-md-6">
      <div class="card">
        <div class="card-header">Personal info &amp; preferences</div>
        <div class="card-body">{{ profile_form|crispy }}</div>
      </div>
    </div>
    <div class="col-12 d-flex justify-content-between">
      <a href="{% url 'accounts:profile' %}" class="btn btn-outline-secondary">Cancel</a>
      <button type="submit" class="btn btn-primary"><i class="ri-save-line me-1"></i> Save changes</button>
    </div>
  </div>
</form>
{% endblock %}
